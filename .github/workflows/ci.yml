name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        # Skip the @SpringBootTest context smoke test which requires live
        # RDS/MongoDB (not reachable from the CI runner); keep all unit tests.
        run: mvn -B clean verify -Dtest='!ShopOrdersApplicationTests'
